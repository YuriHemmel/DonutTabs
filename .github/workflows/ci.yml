name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TS + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Linux system deps (webkit2gtk, rsvg, etc.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps (needed for ts-rs bindings test helpers)
        run: npm ci

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        # Dead-code warnings intentionally allowed during Plano 1: types like
        # AppError::Shortcut/Launcher/Window and AppState.config_path are wired
        # up in Plano 2 (Settings UI). Tighten to -D warnings when Plano 2 lands.
        run: cargo clippy --lib

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib

      - name: Verify ts-rs bindings are up to date (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! git diff --exit-code src/core/types/; then
            echo "::error::ts-rs bindings in src/core/types/ are out of date."
            echo "::error::Run 'cd src-tauri && cargo test --lib config::schema' locally and commit the changes."
            exit 1
          fi
